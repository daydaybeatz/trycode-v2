<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operation Corporation</title>
  <style>
    :root{
      --bg:#0b1220;--panel:#111a2d;--panel2:#17233d;--line:#2d3e64;--text:#d7e2ff;--muted:#8aa2cf;
      --good:#39d98a;--bad:#ff5d73;--risk:#ffb347;--info:#53b3ff;--locked:#6f7b95;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:13px/1.4 Inter,system-ui,Segoe UI,Roboto,sans-serif;height:100vh;overflow:hidden}
    .app{display:grid;grid-template-rows:46px 1fr 120px;height:100vh}
    .topbar{display:grid;grid-template-columns:repeat(7,max-content) 1fr repeat(3,max-content);gap:8px;align-items:center;padding:8px 10px;background:var(--panel);border-bottom:1px solid var(--line)}
    .resource{padding:5px 8px;border:1px solid var(--line);background:var(--panel2);border-radius:8px}
    .resource b{color:#fff}
    .speed button,.time button,.row-actions button,.btn{background:var(--panel2);color:var(--text);border:1px solid var(--line);padding:6px 9px;border-radius:8px;cursor:pointer}
    .btn:disabled{color:var(--locked);cursor:not-allowed}
    .layout{display:grid;grid-template-columns:200px 1fr 320px;min-height:0}
    .nav,.inspector,.feed{background:var(--panel);border-right:1px solid var(--line)}
    .nav{padding:8px;overflow:auto}
    .nav button{width:100%;text-align:left;margin:4px 0;padding:8px 10px;background:transparent;border:1px solid transparent;color:var(--text);border-radius:8px;cursor:pointer}
    .nav button.active{background:var(--panel2);border-color:var(--line)}
    .content{min-height:0;padding:10px;overflow:auto}
    .screen{display:none}
    .screen.active{display:block}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px}
    .grid{display:grid;gap:10px}
    .cards-4{grid-template-columns:repeat(4,minmax(160px,1fr))}
    .cards-3{grid-template-columns:repeat(3,minmax(180px,1fr))}
    .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px}
    .tag{padding:2px 6px;border-radius:999px;border:1px solid var(--line);font-size:11px}
    .good{color:var(--good)}.bad{color:var(--bad)}.risk{color:var(--risk)}.muted{color:var(--muted)}
    .split{display:grid;grid-template-columns:280px 1fr 320px;gap:10px;min-height:520px}
    .list{max-height:520px;overflow:auto}
    .row{padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);margin-bottom:6px;cursor:pointer}
    .row.sel{outline:2px solid var(--info)}
    .row:hover{border-color:var(--info)}
    .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    input,select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px}
    .metric{display:flex;justify-content:space-between;margin-bottom:6px}
    .bar{height:8px;background:#0a1427;border:1px solid var(--line);border-radius:10px;overflow:hidden}
    .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--info),var(--good))}
    .inspector{padding:10px;overflow:auto}
    .feed{grid-column:1/-1;border-right:0;border-top:1px solid var(--line);padding:8px;overflow:auto}
    .feed-item{padding:5px 8px;border-bottom:1px dashed var(--line)}
    .modal-layer,.context-menu{position:fixed;inset:0;display:none}
    .modal-layer.show{display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45)}
    .modal{width:min(760px,90vw);max-height:80vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
    .context-menu{inset:auto;position:fixed;min-width:180px;background:var(--panel);border:1px solid var(--line);border-radius:8px;z-index:40}
    .context-menu.show{display:block}
    .context-menu button{display:block;width:100%;text-align:left;background:none;color:var(--text);border:0;padding:8px;cursor:pointer}
    h2,h3,h4{margin:0 0 8px}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar" id="topbar"></header>
  <div class="layout">
    <aside class="nav" id="nav"></aside>
    <main class="content" id="content"></main>
    <aside class="inspector" id="inspector"></aside>
  </div>
  <footer class="feed" id="feed"></footer>
</div>
<div class="modal-layer" id="modalLayer"></div>
<div class="context-menu" id="contextMenu"></div>
<script>
(() => {
  const sections=["Dashboard","World","Teams","Personnel","Missions","Research","Logistics","Diplomacy","Intelligence","Finance","Reports","Settings"];
  const state={
    core:{date:new Date("2034-05-01T08:00:00Z"), speed:1, paused:false, modal:null, alerts:3},
    ui:{screen:"Dashboard", selected:null, filters:{}, sort:{}, map:{zoom:1,overlay:"control"}},
    world:{treasury:2480000, influence:42, heat:31, resources:{fuel:620,alloys:410,data:290}, reputation:58, contracts:[], events:[]},
    data:seedData(),
    sim:{tickMs:1000}
  };

  function seedData(){
    const regions=["North Coast","Iron Belt","Delta","Sable Corridor","High Frontier","Emerald Basin"].map((name,i)=>({
      id:"r"+i,name,owner:["Asteria","Velorn","Novak"] [i%3],stability:40+Math.random()*50,value:45+Math.random()*50,unrest:20+Math.random()*60,
      military:30+Math.random()*60,sentiment:20+Math.random()*70,intel:10+Math.random()*80,ops:Math.floor(Math.random()*4)
    }));
    const teams=Array.from({length:8},(_,i)=>({id:"t"+i,name:`Viper-${i+1}`,doctrine:["Shock","Stealth","Recon"][i%3],readiness:40+Math.random()*55,power:35+Math.random()*60,stealth:30+Math.random()*60,morale:35+Math.random()*55,cohesion:30+Math.random()*60,region:regions[i%regions.length].name,upkeep:12000+i*2400,status:["Idle","Training","Deployed"][i%3]}));
    const personnel=Array.from({length:28},(_,i)=>({id:"p"+i,name:`Operative ${i+1}`,role:["Commander","Recon","Medic","Engineer","Heavy","Support"][i%6],salary:2200+i*180,loyalty:30+Math.random()*65,fatigue:Math.random()*70,injury:Math.random()<.2?Math.floor(Math.random()*50):0,cert:["Airborne","Signals","CQB","Linguist"][i%4],assigned:i<18?teams[i%teams.length].name:"Reserve"}));
    const missions=Array.from({length:14},(_,i)=>({id:"m"+i,title:["Secure Port","Extract Analyst","Disrupt Pipeline","Counterintel Sweep","Arms Intercept"][i%5],type:["Covert","Military","Economic"][i%3],region:regions[i%regions.length].name,risk:25+Math.random()*65,reward:12000+Math.floor(Math.random()*62000),deadline:2+Math.floor(Math.random()*12),status:["Available","Planned","Active","Completed","Failed"][i%5]}));
    const research=["Weapons","Armor","Medical","Drones","Vehicles","Communications","Propaganda","Surveillance"].map((n,i)=>({id:"rs"+i,name:n,progress:Math.random()*100,cost:24000+i*12000,staff:2+i%4,locked:i>5}));
    const nations=["Asteria","Velorn","Novak","Rhyss","Mireth"].map((n,i)=>({id:"n"+i,name:n,relation:Math.floor(Math.random()*100)-30,pressure:Math.floor(Math.random()*100),need:Math.floor(Math.random()*100)}));
    return {regions,teams,personnel,missions,research,nations,reports:[]};
  }

  function render(){
    renderTopbar(); renderNav(); renderScreen(); renderInspector(); renderFeed();
  }

  function renderTopbar(){
    const d=state.core.date.toISOString().slice(0,10);
    topbar.innerHTML=`
      <div class="resource"><b>Date</b> ${d}</div>
      <div class="resource"><b>Treasury</b> $${fmt(state.world.treasury)}</div>
      <div class="resource"><b>Fuel</b> ${state.world.resources.fuel}</div>
      <div class="resource"><b>Alloys</b> ${state.world.resources.alloys}</div>
      <div class="resource"><b>Data</b> ${state.world.resources.data}</div>
      <div class="resource"><b>Influence</b> ${state.world.influence}</div>
      <div class="resource"><b>Heat</b> ${state.world.heat}</div>
      <div></div>
      <div class="time"><button id="pauseBtn">${state.core.paused?"Resume":"Pause"}</button></div>
      <div class="speed">${[1,2,4].map(v=>`<button data-speed="${v}">x${v}</button>`).join("")}</div>
      <div class="resource"><b>Alerts</b> ${state.core.alerts}</div>`;
    pauseBtn.onclick=()=>{state.core.paused=!state.core.paused; renderTopbar();};
    [...topbar.querySelectorAll("[data-speed]")].forEach(b=>b.onclick=()=>{state.core.speed=+b.dataset.speed;});
  }

  function renderNav(){
    nav.innerHTML=sections.map(s=>`<button class="${state.ui.screen===s?"active":""}" data-s="${s}">${s}</button>`).join("");
    [...nav.querySelectorAll("button")].forEach(b=>b.onclick=()=>{state.ui.screen=b.dataset.s; render();});
  }

  function renderScreen(){
    const s=state.ui.screen;
    if(s==="Dashboard") return content.innerHTML=dashboard();
    if(s==="World") return content.innerHTML=worldScreen();
    if(s==="Teams") return content.innerHTML=teamsScreen();
    if(s==="Personnel") return content.innerHTML=personnelScreen();
    if(s==="Missions") return content.innerHTML=missionsScreen();
    if(s==="Research") return content.innerHTML=researchScreen();
    if(s==="Logistics") return content.innerHTML=genericScreen("Logistics",["Inventory","Procurement","Armory","Vehicles","Routes","Warehouses","Maintenance"]);
    if(s==="Diplomacy") return content.innerHTML=diplomacyScreen();
    if(s==="Intelligence") return content.innerHTML=genericScreen("Intelligence",["Networks","Assets","Counterintel","Black Ops"]);
    if(s==="Finance") return content.innerHTML=genericScreen("Finance",["Overview","Income/Expense","Contracts","Markets","Laundering","Debt","Forecasts"]);
    if(s==="Reports") return content.innerHTML=reportsScreen();
    content.innerHTML=genericScreen("Settings",["Save/Load","Accessibility","Audio","Controls","Codex"]);
    wireRows();
  }

  function dashboard(){
    const unstable=state.data.regions.filter(r=>r.unrest>60).length;
    const active=state.data.missions.filter(m=>m.status==="Active").length;
    const cards=[
      ["Funds",`$${fmt(state.world.treasury)}`],["Supply Health",`${Math.round((state.world.resources.fuel+state.world.resources.alloys)/12)}%`],["Active Teams",state.data.teams.length],["Ongoing Missions",active],
      ["Unstable Regions",unstable],["Research",state.data.research.length],["Diplomacy Pressure",Math.round(avg(state.data.nations.map(n=>n.pressure)))],["Black Ops",3]
    ];
    setTimeout(wireRows,0);
    return `<div class="grid cards-4">${cards.map(c=>`<div class="card"><h4>${c[0]}</h4><div>${c[1]}</div></div>`).join("")}</div>
      <div class="panel"><h3>Command Brief</h3><div class="grid cards-3">${[
        "Active Operations","Global Hotspots","Recent Gains/Losses","Upcoming Deadlines","Risk Alerts","Contract Opportunities","Internal Issues"
      ].map(t=>`<div class="card row" data-type="brief" data-id="${t}">${t}<div class="muted">Double-click to open planner.</div></div>`).join("")}</div></div>`;
  }

  function worldScreen(){
    setTimeout(()=>wireRows("region"),0);
    return `<div class="split">
      <div class="panel"><h3>Map Overlays</h3><div class="filters">${["control","unrest","alignment","resource","military","intel","influence","sentiment","routes"].map(o=>`<button class="btn" data-overlay="${o}">${o}</button>`).join("")}</div><div class="muted">Map camera/zoom remembered: x${state.ui.map.zoom}</div></div>
      <div class="panel"><h3>Geopolitical Map (state-driven mock)</h3><div class="grid cards-3">${state.data.regions.map(r=>`<div class="card row" data-type="region" data-id="${r.id}"><b>${r.name}</b><div>Owner ${r.owner}</div><div class="bar"><i style="width:${r.stability}%"></i></div></div>`).join("")}</div></div>
      <div class="panel"><h3>Actions</h3>${actionButtons(["Fund Proxy","Send Team","Trigger Covert Op","Invest","Destabilize","Negotiate","Open Route","Buy Access","Support Coup","Run Propaganda","Reinforce Assets"])}</div>
    </div>`;
  }

  function teamsScreen(){
    setTimeout(()=>wireRows("team"),0);
    return `<div class="split">
      <div class="panel"><h3>Teams</h3>${searchBar("team")}<div class="list">${state.data.teams.map(t=>teamRow(t)).join("")}</div></div>
      <div class="panel"><h3>Composition Workspace</h3>${["Commander","Assault","Recon","Support","Medic","Engineer","Heavy","Vehicle","Reserve","Support Package"].map(s=>`<div class="metric"><span>${s}</span><span class="tag">Drop slot</span></div>`).join("")}</div>
      <div class="panel"><h3>Actions</h3><div class="row-actions">${actionButtons(["Create Team","Rename","Disband","Assign Personnel","Auto-Balance","Train","Refit","Reassign Vehicle","Rest","Deploy","Set Doctrine"])}</div></div>
    </div>`;
  }

  function teamRow(t){
    return `<div class="row" data-type="team" data-id="${t.id}"><b>${t.name}</b> <span class="tag">${t.doctrine}</span>
      <div class="metric"><span>Status</span><span>${t.status}</span></div>
      ${meter("Readiness",t.readiness)}${meter("Power",t.power)}${meter("Stealth",t.stealth)}
    </div>`;
  }

  function personnelScreen(){
    setTimeout(()=>wireRows("person"),0);
    return `<div class="split"><div class="panel"><h3>Roster</h3>${searchBar("person")}<div class="list">${state.data.personnel.map(p=>`<div class="row" data-type="person" data-id="${p.id}"><b>${p.name}</b> ${p.role}<div class="muted">${p.assigned}</div></div>`).join("")}</div></div>
      <div class="panel"><h3>Profile</h3><div class="muted">Select operative for stat spread, certifications, loyalty, history, and risk factors.</div></div>
      <div class="panel"><h3>Recruitment & Actions</h3>${actionButtons(["Hire","Fire","Assign Team","Train","Promote","Demote","Rest","Interrogate","Bribe","Rehabilitate","Hold Reserve"])}</div></div>`;
  }

  function missionsScreen(){
    setTimeout(()=>wireRows("mission"),0);
    return `<div class="split"><div class="panel"><h3>Mission List</h3><div class="filters">${["Available","Planned","Active","Completed","Failed","Special"].map(t=>`<span class="tag">${t}</span>`).join("")}</div><div class="list">${state.data.missions.map(m=>`<div class="row" data-type="mission" data-id="${m.id}"><b>${m.title}</b> <span class="tag">${m.status}</span><div>${m.region} • ${m.type}</div></div>`).join("")}</div></div>
      <div class="panel"><h3>Mission Detail</h3><div class="muted">Objective, branches, resistance, intel quality, political consequences, reward package, penalties.</div></div>
      <div class="panel"><h3>Launch Planner</h3>${meter("Success",67)}${meter("Exposure",41)}${meter("Casualties",26)}${meter("Escalation",48)}${meter("Profit",72)}<button class="btn risk-action" data-action="Launch Mission" data-risk="high" data-why="Missing armored transport">Review Launch</button></div></div>`;
  }

  function researchScreen(){
    setTimeout(()=>wireRows("research"),0);
    return `<div class="split"><div class="panel"><h3>Categories</h3>${["Weapons","Armor","Medical","Drones","Vehicles","Comms","Propaganda","Surveillance","Sabotage","Logistics","Political Warfare","Infrastructure"].map(c=>`<div class="row">${c}</div>`).join("")}</div>
      <div class="panel"><h3>Project Board</h3>${state.data.research.map(r=>`<div class="row" data-type="research" data-id="${r.id}"><b>${r.name}</b>${meter("Progress",r.progress)}<div class="muted">Staff ${r.staff} • Cost $${fmt(r.cost)}</div></div>`).join("")}</div>
      <div class="panel"><h3>Queue & Lab</h3>${actionButtons(["Start Research","Prioritize","Assign Scientists","Prototype Test","Mitigate Bottleneck"])}</div></div>`;
  }

  function diplomacyScreen(){
    setTimeout(()=>wireRows("nation"),0);
    return `<div class="split"><div class="panel"><h3>Nations & Factions</h3><div class="list">${state.data.nations.map(n=>`<div class="row" data-type="nation" data-id="${n.id}"><b>${n.name}</b><div>Relation ${n.relation}</div></div>`).join("")}</div></div>
      <div class="panel"><h3>Situation</h3><div class="muted">Leader profile, ideology, divisions, dependencies, leverage points.</div></div>
      <div class="panel"><h3>Political Tools</h3>${actionButtons(["Offer Aid","Pressure","Bribe","Leak","Threaten","Mediate","Sponsor","Endorse","Undermine","Sanction","Destabilize","Treaty Builder"])}</div></div>`;
  }

  function reportsScreen(){
    const rows=state.data.reports.slice(-80).reverse();
    return `<div class="split"><div class="panel"><h3>Categories</h3>${["Mission Debriefs","Personnel Incidents","Diplomacy Shifts","Research","Finance","Betrayals","Regional Changes","Intercepted Messages","Long-term Summaries"].map(x=>`<div class="row">${x}</div>`).join("")}</div>
      <div class="panel"><h3>Chronological Archive</h3><div class="list">${rows.map(r=>`<div class="row">${r.date} — ${r.text}</div>`).join("")||"<div class='muted'>No reports yet.</div>"}</div></div>
      <div class="panel"><h3>Detail</h3><div class="muted">Select a report to inspect origin, linked entities, and causal chain.</div></div></div>`;
  }

  function genericScreen(name,tabs){
    return `<div class="panel"><h2>${name}</h2><div class="filters">${tabs.map(t=>`<span class="tag">${t}</span>`).join("")}</div><div class="muted">This section uses shared list/table/cards, filters, sort, and inspector binding.</div></div>`;
  }

  function renderInspector(){
    const s=state.ui.selected;
    if(!s){ inspector.innerHTML=`<h3>Priority Briefing</h3><div class="panel">Urgent: ${urgentText()}</div>`; return; }
    inspector.innerHTML=`<h3>Inspector</h3><div class="panel"><b>${s.name||s.title}</b><pre class="muted" style="white-space:pre-wrap">${JSON.stringify(s,null,2)}</pre></div>`;
  }

  function renderFeed(){
    feed.innerHTML=state.world.events.slice(-30).reverse().map(e=>`<div class="feed-item">${e.date} — ${e.text}</div>`).join("")||"<div class='feed-item muted'>Live event strip waiting for simulation ticks…</div>";
  }

  function wireRows(type){
    content.querySelectorAll(".row[data-id]").forEach(el=>{
      el.onclick=()=>{ const item=findBy(el.dataset.type,el.dataset.id); state.ui.selected=item; content.querySelectorAll('.row.sel').forEach(r=>r.classList.remove('sel')); el.classList.add('sel'); renderInspector(); };
      el.ondblclick=()=>openModal("Detail Planner",`Deep interaction for <b>${findBy(el.dataset.type,el.dataset.id).name||findBy(el.dataset.type,el.dataset.id).title}</b>.`);
      el.oncontextmenu=(ev)=>{ev.preventDefault(); openContext(ev.clientX,ev.clientY,["Pin Inspector","Queue Action","Add to Watchlist"]);};
      el.title="Single-click: select • Double-click: open planner • Right-click: context menu";
    });
    content.querySelectorAll("[data-overlay]").forEach(b=>b.onclick=()=>{state.ui.map.overlay=b.dataset.overlay;pushEvent(`Overlay switched to ${b.dataset.overlay}`);});
    content.querySelectorAll(".risk-action").forEach(b=>b.onclick=()=>showConsequencePreview(b.dataset.action,b.dataset.why));
    content.querySelectorAll(".btn[disabled]").forEach(b=>b.title=b.dataset.disabledReason||"Unavailable due to requirements.");
  }

  function actionButtons(names){return names.map(n=>`<button class="btn" data-action="${n}">${n}</button>`).join(" ");}
  function searchBar(scope){return `<div class="filters"><input placeholder="Search ${scope}..." /><select><option>Sort</option><option>Name</option><option>Risk</option><option>Cost</option></select><select><option>Filter</option><option>Assigned</option><option>Reserve</option></select></div>`;}
  function meter(label,v){return `<div class="metric"><span>${label}</span><span>${Math.round(v)}%</span></div><div class="bar"><i style="width:${Math.round(v)}%"></i></div>`;}
  function fmt(n){return n.toLocaleString();}
  function avg(a){return a.reduce((x,y)=>x+y,0)/Math.max(a.length,1);}

  function findBy(type,id){
    const map={team:"teams",person:"personnel",mission:"missions",region:"regions",research:"research",nation:"nations"};
    return state.data[map[type]]?.find(x=>x.id===id)||{id,name:"Unknown"};
  }

  function showConsequencePreview(action,why){
    openModal("Consequence Preview",`
      <div class='panel'>Action: <b>${action}</b></div>
      <div class='panel'>Projected outcomes:<ul><li class='risk'>+Heat 4-12</li><li class='bad'>Casualty chance 18%</li><li class='good'>Treasury gain +$48k (if successful)</li></ul></div>
      <div class='panel muted'>Risk factor: ${why||"Exposure and weak intel."}</div>
      <button class='btn' id='confirmActionBtn'>Confirm Action</button>
    `);
    setTimeout(()=>{const b=document.getElementById('confirmActionBtn'); if(b)b.onclick=()=>{pushEvent(`${action} confirmed with risk preview.`); closeModal();};},0);
  }

  function openModal(title,html){
    modalLayer.classList.add('show');
    modalLayer.innerHTML=`<div class='modal'><h3>${title}</h3>${html}<div style='margin-top:10px'><button class='btn' id='closeModalBtn'>Close</button></div></div>`;
    document.getElementById('closeModalBtn').onclick=closeModal;
  }
  function closeModal(){modalLayer.classList.remove('show'); modalLayer.innerHTML='';}

  function openContext(x,y,items){
    contextMenu.classList.add('show');
    contextMenu.style.left=x+'px'; contextMenu.style.top=y+'px';
    contextMenu.innerHTML=items.map(i=>`<button>${i}</button>`).join('');
  }
  window.addEventListener('click',()=>contextMenu.classList.remove('show'));

  function urgentText(){
    const hot=state.data.regions.sort((a,b)=>b.unrest-a.unrest)[0];
    return `Highest unrest in ${hot.name}. Recommend intelligence sweep and rapid stabilization package.`;
  }

  function pushEvent(text){
    const date=state.core.date.toISOString().slice(0,10);
    const entry={date,text};
    state.world.events.push(entry); state.data.reports.push(entry);
    renderFeed();
  }

  function tick(){
    if(state.core.paused) return;
    for(let i=0;i<state.core.speed;i++){
      state.core.date.setUTCDate(state.core.date.getUTCDate()+1);
      const r=state.data.regions[Math.floor(Math.random()*state.data.regions.length)];
      r.unrest=Math.max(0,Math.min(100,r.unrest+(Math.random()*12-6)));
      state.world.treasury+=Math.floor(Math.random()*32000-14000);
      state.world.heat=Math.max(0,Math.min(100,state.world.heat+(Math.random()*6-2)));
      if(Math.random()<.4) pushEvent(`${r.name}: ${Math.random()<.5?"operation outcome":"political shift"} recorded.`);
    }
    renderTopbar(); if(state.ui.screen==="Dashboard"||state.ui.screen==="Reports") renderScreen(); renderInspector();
  }

  setInterval(tick,state.sim.tickMs);
  render();
})();
</script>
</body>
</html>
