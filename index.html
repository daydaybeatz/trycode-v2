<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TRY_CODE_FC_V43</title>
  <script src="https://unpkg.com/fengari-web/dist/fengari-web.js" async crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Merriweather:wght@400;700&family=Orbitron:wght@500;700&family=Playfair+Display:wght@500;700&family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#dbe5d0;
      --paper:#edf2df;
      --panel:#c7d8c2;
      --panel2:#aebfb5;
      --line:#506f66;
      --shadow:#7f9585;
      --ink:#20332d;
      --accent:#577f77;
      --accent2:#89a99f;
      --blue:#527f8a;
      --green:#6f9278;
      --cream:#f4f6e8;
      --danger:#4f756f;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:linear-gradient(180deg,#c13930 0 22px,#f3e0b0 22px 100%);font-family:"Trebuchet MS",Verdana,sans-serif;color:var(--ink);overscroll-behavior:none}
    button,input,select,textarea{font:inherit}
    body{padding-top:env(safe-area-inset-top)}
    .app{height:100%;display:flex;flex-direction:column;min-height:0}
    .topbar{flex:0 0 38px;display:flex;align-items:center;gap:3px;padding:3px 5px;background:linear-gradient(180deg,#efe0bc,#e8cf96);border-bottom:4px solid var(--line);box-shadow:inset 0 -3px 0 #c39a5b}
    .topbarRuntimeControls{display:flex;align-items:center;gap:6px;flex:0 0 auto}
    .topbarRuntimeControls .fileBtn{padding:6px 10px;font-size:11px}
    .runtimeHideBtn.hidden{display:none}
    body.runtime-ui-hidden .topbar,body.runtime-ui-hidden #view-runtime .hud,body.runtime-ui-hidden #view-runtime .runtimeErrorBox,body.runtime-ui-hidden #view-runtime .runtimeDialogLayer{display:none !important}
    body.runtime-ui-hidden .views{position:fixed;inset:0}
    body.runtime-ui-hidden #view-runtime .runtimeView{inset:0;padding:0;border:none;border-radius:0;box-shadow:none;background:#000}
    body.runtime-ui-hidden #view-runtime .screenStage{inset:0;border:none;border-radius:0;box-shadow:none;background:#000}

    body.dark-mode .tab,
    body.dark-mode .fileBtn,
    body.dark-mode .uiBtn,
    body.dark-mode .mbtn,
    body.dark-mode .smallbtn,
    body.dark-mode .loadExampleBtn,
    body.dark-mode .panelSkin,
    body.dark-mode .codeView,
    body.dark-mode .pane,
    body.dark-mode .itemRow,
    body.dark-mode .tileBtn,
    body.dark-mode .spritePanelPreview,
    body.dark-mode .strokeStepper,
    body.dark-mode .menuToggleLabel,
    body.dark-mode .menuSection,
    body.dark-mode .menuSectionHeader,
    body.dark-mode .menuLoadPanel,
    body.dark-mode .codeScrollShell,
    body.dark-mode .codeEditorSurface,
    body.dark-mode .codeSearchInput,
    body.dark-mode .sidebar input,
    body.dark-mode .sidebar select,
    body.dark-mode .sidebar textarea{border-radius:4px}
    body.dark-mode .menuToggleInput,
    body.dark-mode .menuToggleInput::after,
    body.dark-mode .joy,
    body.dark-mode .joy .knob,
    body.dark-mode .symbtn,
    body.dark-mode .dpadBtn,
    body.dark-mode .sysbtn{border-radius:6px}
    @media (max-width: 900px){
      .runtimeHideBtn{display:none !important}
    }
    .brand{flex:0 0 auto;padding:7px 10px;border:3px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#b82626,#912020);color:#fff6eb;font-weight:900;letter-spacing:.05em;text-shadow:2px 2px 0 #561010;box-shadow:0 4px 0 #6f1818;font-size:11px}
    .tabsWrap{flex:1;min-width:0;overflow-x:auto;scrollbar-width:none}
    .tabsWrap::-webkit-scrollbar{display:none}
    .tabs{display:flex;gap:4px;min-width:max-content;padding-right:6px}
    .tab,.fileBtn,.uiBtn,.mbtn,.smallbtn,.loadExampleBtn{border:3px solid var(--line);border-radius:13px;background:linear-gradient(180deg,var(--cream),#eed4a2);color:var(--ink);box-shadow:0 4px 0 var(--shadow);cursor:pointer}
    .tab{padding:3px 6px;font-weight:700;white-space:nowrap;font-size:10px;line-height:1.0}
    .tab.active{background:linear-gradient(180deg,#fffdfa,#fff0ca);border-color:var(--accent);box-shadow:0 4px 0 #7a2a18,0 0 0 2px #fff2d6 inset;color:var(--accent)}
    .tab.cat-logic,.uiBtn.cat-logic,.mbtn.cat-logic{background:linear-gradient(180deg,#9fcbff,#79aee6);border-color:#244b78;box-shadow:0 4px 0 #1c3656;color:#10273f}
    .tab.cat-logic.active,.uiBtn.cat-logic.active{background:linear-gradient(180deg,#d6ecff,#a7d1ff);border-color:#17385f;box-shadow:0 4px 0 #15314d,0 0 0 2px rgba(255,255,255,.45) inset;color:#17385f}
    .tab.cat-graphics,.uiBtn.cat-graphics,.mbtn.cat-graphics{background:linear-gradient(180deg,#b8e39d,#8fcb77);border-color:#355d2d;box-shadow:0 4px 0 #294822;color:#20361c}
    .tab.cat-graphics.active,.uiBtn.cat-graphics.active{background:linear-gradient(180deg,#e3f6d4,#bde6a8);border-color:#27471f;box-shadow:0 4px 0 #203a1a,0 0 0 2px rgba(255,255,255,.45) inset;color:#27471f}
    .tab.cat-sound,.uiBtn.cat-sound,.mbtn.cat-sound{background:linear-gradient(180deg,#ffe89b,#ffd158);border-color:#8a6318;box-shadow:0 4px 0 #6e4f12;color:#4f390d}
    .tab.cat-sound.active,.uiBtn.cat-sound.active{background:linear-gradient(180deg,#fff5cc,#ffe48b);border-color:#6f4f11;box-shadow:0 4px 0 #5a400e,0 0 0 2px rgba(255,255,255,.45) inset;color:#5a400e}
    .fileBtn,.uiBtn,.mbtn,.smallbtn,.loadExampleBtn{padding:8px 11px;font-weight:700}
    .fileBtn{
      display:flex;align-items:center;gap:6px;line-height:1.0;min-width:72px;
    }
    .fileBtn svg{width:16px;height:16px}
    .fileBtn .label{font-size:10px;display:flex;flex-direction:column;gap:2px}
    .fileBtn .label b{font-size:10px;letter-spacing:.03em}
    .fileBtn .label span{font-size:9px;opacity:.85}
    .fileBtnToggle{min-width:0;padding:8px 9px}
    .fileBtn.active,.fileBtnToggle.active,.uiBtn.active{box-shadow:0 4px 0 #915421}
    .uiBtn.active{background:linear-gradient(180deg,#fff,#ffdca8);border-color:var(--accent2);color:var(--accent);box-shadow:0 4px 0 #915421}
    .uiBtn.destructive{background:linear-gradient(180deg,#ff9ca2,#c94c67);border-color:#ffd7dc;box-shadow:0 4px 0 #5a2030;color:#20111a}
    .runtimeHideBtn{margin-left:6px}

    .views{flex:1;min-height:0;position:relative}
    .view{position:absolute;inset:0;display:none}
    .view.active{display:block}

    .menuCard{position:absolute;left:10px;top:52px;right:10px;max-width:720px;border:4px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#fff7e3,#efd4a0);box-shadow:0 7px 0 #9a6a38;padding:10px;z-index:80;display:none}
    .menuCard.show{display:block}
    .menuTitle{font-weight:900;margin:0 0 6px 0;font-size:14px;color:#a7281f;text-shadow:1px 1px 0 #fff1cf}
    .menuCloseRow{display:flex;justify-content:flex-end}
    .menuSection{border:3px solid rgba(111,61,32,.35);border-radius:14px;padding:6px 6px 0;margin:0 0 10px}
    .menuSectionHeader{width:100%;display:flex;align-items:center;justify-content:space-between;padding:6px 10px;margin:0 0 8px;border:3px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff7e3,#f0d7a2);font-weight:900;letter-spacing:.05em}
    .menuSectionHeader::after{content:'>';font-weight:900}
    .menuSection.open .menuSectionHeader::after{content:'v'}
    .menuSectionBody{display:none}
    .menuSection.open .menuSectionBody{display:block}
    .menuToggleRow{padding:0 6px 10px}
    .menuToggleLabel{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;border:3px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#fff7e3,#f0d7a2);color:var(--ink);font-size:12px;font-weight:700;box-shadow:0 4px 0 #c08b52}
    .menuToggleInput{appearance:none;-webkit-appearance:none;width:52px;height:30px;border:3px solid var(--line);border-radius:999px;background:linear-gradient(180deg,#ead5aa,#d6b67a);box-shadow:inset 0 0 0 2px rgba(111,61,32,.14);position:relative;cursor:pointer}
    .menuToggleInput::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:linear-gradient(180deg,#fffaf0,#fff0cc);box-shadow:0 2px 0 rgba(111,61,32,.22);transition:transform .15s ease}
    .menuToggleInput:checked{background:linear-gradient(180deg,var(--accent2),var(--accent));border-color:#fff2ce}
    .menuToggleInput:checked::after{transform:translateX(20px)}
